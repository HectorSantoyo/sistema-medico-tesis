{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eliminar cita — Sistema Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card app-card">
                    <div class="card-body text-center">
                        <h4 class="app-section-title mb-4">¿Estás seguro de que deseas eliminar esta cita?</h4>
                        <p class="app-field-value"><strong>Paciente:</strong> {{ cita.paciente }}</p>
                        <p class="app-field-value"><strong>Fecha:</strong> {{ cita.fecha }} — <strong>Hora:</strong> {{ cita.hora }}</p>
                        <p class="app-field-value"><strong>Motivo:</strong> {{ cita.motivo|default:"—" }}</p>

                        <form method="post" class="d-flex justify-content-center gap-2 mt-4">
                            {% csrf_token %}
                            <a href="{% url 'citas_proximas' %}" class="btn btn-volver">Cancelar</a>
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
